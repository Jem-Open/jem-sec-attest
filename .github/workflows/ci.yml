name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm type-check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:coverage

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, type-check, test]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile

      - name: Add Dex host entry
        run: echo "127.0.0.1 dex" | sudo tee -a /etc/hosts

      - name: Start infrastructure
        run: pnpm docker:up

      # NOTE: These are test-only fixtures for the local Docker stack (Dex IDP + Postgres).
      # They match docker/compose.yml and docker/dex/config.yaml — not real credentials.
      # DB uses compose defaults (postgres:postgres). ACME_ env vars match the tenant
      # YAML (config/tenants/acme-corp.yaml) and the Dex static client config.
      - name: Build application
        run: pnpm build
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/jem_attest
          SESSION_SECRET: ci-test-session-secret-minimum-32-characters-long
          ACME_OIDC_CLIENT_SECRET: local-dev-secret-min32chars-replace-this-1234
          ACME_WEBHOOK_SECRET: http://localhost:9999/webhook/acme
          GLOBEX_WEBHOOK_SECRET: http://localhost:9999/webhook/globex

      - name: Start application
        run: pnpm start &
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/jem_attest
          SESSION_SECRET: ci-test-session-secret-minimum-32-characters-long
          ACME_OIDC_CLIENT_SECRET: local-dev-secret-min32chars-replace-this-1234
          ACME_WEBHOOK_SECRET: http://localhost:9999/webhook/acme
          GLOBEX_WEBHOOK_SECRET: http://localhost:9999/webhook/globex

      - name: Wait for application
        run: npx wait-on http://localhost:3000/api/health --timeout 60000

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Run E2E tests
        run: pnpm test:e2e --retries=2
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/jem_attest
          SESSION_SECRET: ci-test-session-secret-minimum-32-characters-long
          ACME_OIDC_CLIENT_SECRET: local-dev-secret-min32chars-replace-this-1234
          ACME_WEBHOOK_SECRET: http://localhost:9999/webhook/acme
          GLOBEX_WEBHOOK_SECRET: http://localhost:9999/webhook/globex

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      - name: Cleanup infrastructure
        if: always()
        run: pnpm docker:down
